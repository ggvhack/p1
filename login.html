<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpingHands • Login / Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: white;
            width: 94%;
            max-width: 480px;
            margin: 1.5rem auto;
            border-radius: 2rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            padding: 2rem 1.8rem;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .logo-area i {
            font-size: 3rem;
            color: #1877f2;
            background: #e7f0ff;
            padding: 0.8rem;
            border-radius: 50%;
        }
        .logo-area h2 {
            font-weight: 600;
            margin-top: 0.3rem;
            color: #1e2b3a;
        }
        .logo-area p {
            color: #4b5563;
            font-size: 0.9rem;
        }
        .tab-bar {
            display: flex;
            gap: 0.5rem;
            background: #f0f2f5;
            padding: 0.3rem;
            border-radius: 3rem;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 0.7rem 0;
            font-weight: 600;
            border-radius: 3rem;
            cursor: pointer;
            color: #2c3e50;
        }
        .tab.active {
            background: white;
            color: #1877f2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 1.3rem;
        }
        label {
            font-weight: 500;
            color: #2c3e50;
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }
        label i {
            margin-right: 0.3rem;
            color: #1877f2;
            width: 1.2rem;
        }
        input, select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #d9e1ec;
            border-radius: 2rem;
            font-size: 1rem;
            background: white;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 3px rgba(24,119,242,0.2);
        }
        .city-row {
            display: flex;
            gap: 0.8rem;
        }
        .city-row select {
            flex: 1;
        }
        .btn-primary {
            background: #1877f2;
            color: white;
            border: none;
            width: 100%;
            padding: 0.9rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 1.2rem 0 1rem;
            box-shadow: 0 4px 10px rgba(24,119,242,0.3);
        }
        .btn-primary:hover {
            background: #166fe5;
        }
        .demo-login {
            background: #e7f0ff;
            border-radius: 2rem;
            padding: 1rem;
            margin-top: 1.8rem;
        }
        .demo-login p {
            font-weight: 600;
            color: #1e2b3a;
            margin-bottom: 0.6rem;
        }
        .demo-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .demo-btn {
            background: white;
            border: 1px solid #bcccdc;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .demo-btn:hover {
            background: #d9e7ff;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-area">
            <i class="fas fa-hand-holding-heart"></i>
            <h2>HelpingHands</h2>
            <p>Raipur / Bilaspur • volunteer • NGO • organisation</p>
        </div>

        <div class="tab-bar">
            <div class="tab active" id="loginTab" onclick="switchTab('login')">Log in</div>
            <div class="tab" id="registerTab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Log in</button>
        </div>

        <!-- REGISTER FORM (hidden) -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full name</label>
                <input type="text" id="regName" placeholder="Priya Sharma">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="regEmail" placeholder="priya@example.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="regPassword" placeholder="min 3 characters">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Register as</label>
                <select id="regRole">
                    <option value="volunteer">Volunteer</option>
                    <option value="ngo">NGO</option>
                    <option value="organisation">Organisation</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-city"></i> City</label>
                <div class="city-row">
                    <select id="regCity">
                        <option value="Raipur">Raipur</option>
                        <option value="bilaspur">Bilaspur</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
        </div>

        <!-- DEMO LOGIN -->
        <div class="demo-login">
            <p><i class="fas fa-people-arrows"></i> Demo login</p>
            <div class="demo-buttons">
                <div class="demo-btn" onclick="fillDemo('riya@help.com','riya123')"><i class="fas fa-leaf"></i> Volunteer</div>
                <div class="demo-btn" onclick="fillDemo('sahyog@ngo.in','help123')"><i class="fas fa-hand-holding-heart"></i> NGO</div>
                <div class="demo-btn" onclick="fillDemo('org@care.org','org123')"><i class="fas fa-building"></i> Organisation</div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'helpinghands_users';

        // Initialize with demo users if empty
        if (!localStorage.getItem(STORAGE_KEY)) {
            const defaultUsers = [
                { name: 'Riya Sharma', email: 'riya@help.com', password: 'riya123', role: 'volunteer', city: 'Raipur' },
                { name: 'Sahyog NGO', email: 'sahyog@ngo.in', password: 'help123', role: 'ngo', city: 'bilaspur' },
                { name: 'CareOrg', email: 'org@care.org', password: 'org123', role: 'organisation', city: 'Raipur' }
            ];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultUsers));
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }

        function fillDemo(email, password) {
            switchTab('login');
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = password;
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const role = document.getElementById('regRole').value;
            const city = document.getElementById('regCity').value;

            if (!name || !email || !password || !role || !city) {
                alert('Please fill all fields');
                return;
            }
            if (password.length < 3) {
                alert('Password must be at least 3 characters');
                return;
            }

            const users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            if (users.find(u => u.email === email)) {
                alert('Email already registered. Try login.');
                return;
            }

            const newUser = { name, email, password, role, city };
            users.push(newUser);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            alert('Registration successful! Please login.');
            switchTab('login');
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                alert('Enter email and password');
                return;
            }

            const users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                alert('Invalid credentials. Use demo or register.');
                return;
            }

            // Redirect to dashboard page with user data in URL
            const params = new URLSearchParams({
                name: user.name,
                email: user.email,
                role: user.role,
                city: user.city
            });
            window.location.href = `dashboard.html?${params.toString()}`;
        }
    </script>
</body>
</html>
