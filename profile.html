<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpingHands • Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; }
        .dash-container { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
        .dash-header { background: white; padding: 0.7rem 1.5rem; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 10; flex-wrap: wrap; gap: 10px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.3rem; color: #1877f2; cursor: pointer; }
        .user-badge { background: #e7f0ff; border-radius: 2rem; padding: 0.3rem 1.2rem 0.3rem 0.8rem; display: flex; align-items: center; gap: 8px; font-weight: 500; cursor: pointer; }
        .user-badge i { font-size: 1.5rem; color: #1877f2; }
        .badge-detail { line-height: 1.2; }
        .badge-name { font-weight: 700; font-size: 0.95rem; }
        .badge-role { font-size: 0.75rem; color: #4b5563; }
        .dash-main { display: flex; flex: 1; }
        .side-nav { width: 280px; background: white; padding: 1.5rem 0.8rem; box-shadow: 2px 0 10px rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 0.3rem; height: calc(100vh - 80px); position: sticky; top: 80px; overflow-y: auto; }
        .side-nav a { text-decoration: none; color: #2c3e50; padding: 0.9rem 1.2rem; border-radius: 2rem; font-weight: 500; display: flex; align-items: center; gap: 16px; transition: 0.2s; }
        .side-nav a i { width: 24px; font-size: 1.2rem; color: #1877f2; }
        .side-nav a:hover, .side-nav a.active { background: #e7f0ff; color: #1877f2; }
        .content-area { flex: 1; padding: 1.5rem 2rem; max-width: 800px; margin: 0 auto; width: 100%; padding-bottom: 80px; }
        .page-content { background: white; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.02); text-align: left; max-width: 400px; margin: 0 auto; }
        .profile-field { margin: 1.5rem 0; font-size: 1.1rem; border-bottom: 1px solid #e9edf2; padding-bottom: 0.5rem; }
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); justify-content: space-around; padding: 0.6rem 0.8rem; border-top-left-radius: 24px; border-top-right-radius: 24px; z-index: 20; overflow-x: auto; }
        .bottom-nav a { text-align: center; color: #4b5563; font-size: 0.7rem; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 60px; }
        .bottom-nav a i { font-size: 1.3rem; }
        .bottom-nav a.active { color: #1877f2; }
        @media (max-width: 768px) { .side-nav { display: none; } .bottom-nav { display: flex; } .content-area { padding: 1rem 1rem 80px 1rem; } }
    </style>
</head>
<body>
    <div class="dash-container">
        <header class="dash-header">
            <div class="logo" onclick="goToPage('feed')"><i class="fas fa-hand-holding-heart"></i> <span>HelpingHands</span></div>
            <div class="user-badge" onclick="goToPage('profile')"><i class="fas fa-user-circle"></i><div class="badge-detail"><span class="badge-name" id="displayName">Loading...</span><span class="badge-role" id="displayRoleCity"></span></div></div>
        </header>
        <div class="dash-main">
            <nav class="side-nav">
                <a href="#" onclick="goToPage('feed')"><i class="fas fa-newspaper"></i> Feed</a>
                <a href="#" onclick="goToPage('donation')"><i class="fas fa-hand-holding-heart"></i> Donation</a>
                <a href="#" onclick="goToPage('leaderboard')"><i class="fas fa-trophy"></i> Leaderboard</a>
                <a href="#" class="active" onclick="return false;"><i class="fas fa-id-card"></i> Profile</a>
                <a href="#" onclick="goToPage('emergency')"><i class="fas fa-ambulance"></i> Emergency Guide</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
            <div class="content-area">
                <div class="page-content">
                    <h2 style="text-align:center;"><i class="fas fa-id-card"></i> Your Profile</h2>
                    <div class="profile-field"><strong>Name:</strong> <span id="profileName"></span></div>
                    <div class="profile-field"><strong>Email:</strong> <span id="profileEmail"></span></div>
                    <div class="profile-field"><strong>Role:</strong> <span id="profileRole"></span></div>
                    <div class="profile-field"><strong>City:</strong> <span id="profileCity"></span></div>
                    <div class="profile-field"><strong>Member since:</strong> March 2026</div>
                </div>
            </div>
        </div>
        <nav class="bottom-nav">
            <a href="#" onclick="goToPage('feed')"><i class="fas fa-newspaper"></i> <span>Feed</span></a>
            <a href="#" onclick="goToPage('donation')"><i class="fas fa-hand-holding-heart"></i> <span>Donate</span></a>
            <a href="#" onclick="goToPage('leaderboard')"><i class="fas fa-trophy"></i> <span>Top</span></a>
            <a href="#" class="active" onclick="return false;"><i class="fas fa-id-card"></i> <span>Profile</span></a>
            <a href="#" onclick="goToPage('emergency')"><i class="fas fa-ambulance"></i> <span>Emergency</span></a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
        </nav>
    </div>
    <script>
        let currentUser = null;
        function getUserFromUrl() { const params = new URLSearchParams(window.location.search); return { name: params.get('name') || 'Guest User', email: params.get('email') || 'guest@example.com', role: params.get('role') || 'volunteer', city: params.get('city') || 'Raipur' }; }
        function initPage() { 
            currentUser = getUserFromUrl(); 
            document.getElementById('displayName').innerText = currentUser.name; 
            document.getElementById('profileName').innerText = currentUser.name;
            document.getElementById('profileEmail').innerText = currentUser.email;
            let roleDisplay = currentUser.role; 
            if (currentUser.role === 'ngo') roleDisplay = 'NGO'; 
            else if (currentUser.role === 'organisation') roleDisplay = 'Organisation'; 
            else roleDisplay = 'Volunteer'; 
            document.getElementById('profileRole').innerText = roleDisplay;
            document.getElementById('profileCity').innerText = current.user?.city || currentUser.city;
            document.getElementById('displayRoleCity').innerText = `${roleDisplay} · ${currentUser.city}`; 
        }
        function goToPage(page) { const params = new URLSearchParams({ name: currentUser.name, email: currentUser.email, role: currentUser.role, city: currentUser.city }); if (page === 'feed') window.location.href = `dashboard.html?${params.toString()}`; else window.location.href = `${page}.html?${params.toString()}`; }
        function logout() { window.location.href = 'login.html'; }
        window.onload = initPage;
    </script>
</body>
</html>
